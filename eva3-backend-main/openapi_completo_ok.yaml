  /catalogos:
    get:
      tags:
        - Catalogos
      operationId: listarCatalogos
      summary: Lista catálogos del sistema
      description: Permite obtener opciones reutilizables como estados, rubros, modalidades, jornadas, idiomas y roles.
      parameters:
        - name: tipo
          in: query
          required: false
          schema:
            type: string
            example: estado_perfil
        - name: activo
          in: query
          required: false
          schema:
            type: boolean
            example: true
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            example: 10
      responses:
        "200":
          description: Catálogos obtenidos correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogosPaginados"
        "500":
