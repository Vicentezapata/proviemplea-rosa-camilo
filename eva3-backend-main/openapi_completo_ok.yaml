              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - Catalogos
      operationId: crearCatalogo
      summary: Crea un nuevo registro de catálogo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogoCreate"
      responses:
        "201":
          description: Catálogo creado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogoCompleto"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Ya existe un catálogo con ese tipo y nombre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /catalogos/{id}:
    get:
      tags:
        - Catalogos
      operationId: obtenerCatalogoPorId
      summary: Obtiene un catálogo por ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Catálogo encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogoCompleto"
        "404":
          description: Catálogo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Catalogos
      operationId: actualizarCatalogo
      summary: Actualiza completamente un catálogo
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogoUpdate"
      responses:
        "200":
          description: Catálogo actualizado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogoCompleto"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Catálogo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Catalogos
      operationId: eliminarCatalogo
      summary: Elimina lógicamente un catálogo
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Catálogo eliminado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeRespuesta"
              example:
                status: ok
                message: Catálogo eliminado correctamente
        "404":
          description: Catálogo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

