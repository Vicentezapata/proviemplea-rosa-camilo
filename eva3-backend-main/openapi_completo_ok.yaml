                $ref: "#/components/schemas/Error"

    post:
      tags:
        - Solicitudes
      operationId: crearSolicitud
      summary: Crea una solicitud de contacto de empresa hacia talento
      description: No permite solicitud pendiente duplicada para la misma empresa y talento.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolicitudContactoCreate"
