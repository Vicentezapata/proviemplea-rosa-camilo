            example: 1
        - name: talento_id
          in: query
          required: false
          schema:
            type: integer
            example: 2
        - name: estado_solicitud
          in: query
          required: false
          schema:
            type: string
            example: pendiente
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            example: 10
