openapi: 3.0.3

info:
  title: ProviEmplea API
  description: >
    API backend para plataforma de intermediación laboral con búsqueda inversa,
    CV Ciego, gestión de empresas, solicitudes de contacto y seguimiento de procesos.
    La API considera paginación, filtros y manejo de errores para optimizar las operaciones CRUD.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Servidor local de desarrollo

tags:
  - name: Sistema
    description: Estado general de la API
  - name: Talentos
    description: Gestión de perfiles laborales y CV Ciego
  - name: Empresas
    description: Gestión de empresas registradas y validadas
  - name: Solicitudes
    description: Solicitudes de contacto entre empresas y talentos
  - name: Seguimientos
    description: Seguimiento de procesos de selección
  - name: Catalogos
    description: Opciones reutilizables del sistema

paths:
  /health:
    get:
      tags:
        - Sistema
      operationId: getHealth
      summary: Verifica el estado de la API
      responses:
        "200":
          description: API funcionando correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeRespuesta"
              example:
                status: ok
                message: ProviEmplea API funcionando correctamente

  /talentos:
    get:
      tags:
        - Talentos
      operationId: listarTalentos
      summary: Lista talentos aplicando CV Ciego
      description: >
        Retorna talentos visibles para empresas, ocultando datos personales y sociodemográficos
        como nombre, rut, correo, teléfono, dirección, fecha de nacimiento, género y comuna.
        Incluye filtros y paginación para mejorar rendimiento.
      parameters:
        - name: estado_perfil
          in: query
          required: false
          schema:
            type: string
            example: validado
        - name: area_profesional
          in: query
          required: false
          schema:
            type: string
            example: Tecnología
        - name: discapacidad_ley_21015
          in: query
          required: false
          schema:
            type: boolean
            example: true
        - name: pretension_renta_max
          in: query
          required: false
          schema:
            type: integer
            example: 900000
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
            example: 10
      responses:
        "200":
          description: Lista de talentos obtenida correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentosPaginados"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - Talentos
      operationId: crearTalento
      summary: Crea un nuevo talento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalentoCreate"
      responses:
        "201":
          description: Talento creado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentoCompleto"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Ya existe un talento con ese correo o rut
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /talentos/{id}:
    get:
      tags:
        - Talentos
      operationId: obtenerTalentoPorId
      summary: Obtiene un talento por ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Talento encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentoCompleto"
        "404":
          description: Talento no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Talentos
      operationId: actualizarTalento
      summary: Actualiza completamente un talento
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalentoUpdate"
      responses:
        "200":
          description: Talento actualizado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentoCompleto"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Talento no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Talentos
      operationId: eliminarTalento
      summary: Elimina lógicamente un talento
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Talento eliminado o desactivado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeRespuesta"
              example:
                status: ok
                message: Talento eliminado correctamente
        "404":
          description: Talento no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /talentos/{id}/estado:
    patch:
      tags:
        - Talentos
      operationId: cambiarEstadoTalento
      summary: Cambia el estado del perfil de un talento
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalentoEstadoPatch"
      responses:
        "200":
          description: Estado actualizado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentoCompleto"
        "400":
          description: Estado inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Talento no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

