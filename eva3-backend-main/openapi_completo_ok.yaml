      tags:
        - Solicitudes
      operationId: listarSolicitudes
      summary: Lista solicitudes de contacto
      description: Retorna solicitudes con filtros por empresa, talento, estado y paginación.
      parameters:
        - name: empresa_id
          in: query
          required: false
          schema:
