openapi: 3.0.3
info:
  description: |
    API backend para plataforma de intermediación laboral con búsqueda inversa, CV Ciego, gestión de empresas, solicitudes de contacto y seguimiento de procesos. La API considera paginación, filtros y manejo de errores para optimizar las operaciones CRUD.
  title: ProviEmplea API
  version: 1.0.0
servers:
- description: Servidor local de desarrollo
  url: http://localhost:3000/api
tags:
- description: Estado general de la API
  name: Sistema
- description: Gestión de perfiles laborales y CV Ciego
  name: Talentos
- description: Gestión de empresas registradas y validadas
  name: Empresas
- description: Solicitudes de contacto entre empresas y talentos
  name: Solicitudes
- description: Seguimiento de procesos de selección
  name: Seguimientos
- description: Opciones reutilizables del sistema
  name: Catalogos
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          content:
            application/json:
              example:
                status: ok
                message: ProviEmplea API funcionando correctamente
              schema:
                $ref: "#/components/schemas/MensajeRespuesta"
          description: API funcionando correctamente
      summary: Verifica el estado de la API
      tags:
      - Sistema
      x-eov-operation-handler: controllers/SistemaController
  /talentos:
    get:
      description: |
        Retorna talentos visibles para empresas, ocultando datos personales y sociodemográficos como nombre, rut, correo, teléfono, dirección, fecha de nacimiento, género y comuna. Incluye filtros y paginación para mejorar rendimiento.
      operationId: listarTalentos
      parameters:
      - explode: true
        in: query
        name: estado_perfil
        required: false
        schema:
          example: validado
          type: string
        style: form
      - explode: true
        in: query
        name: area_profesional
        required: false
        schema:
          example: Tecnología
          type: string
        style: form
      - explode: true
        in: query
        name: discapacidad_ley_21015
        required: false
        schema:
          example: true
          type: boolean
        style: form
      - explode: true
        in: query
        name: pretension_renta_max
        required: false
        schema:
          example: 900000
          type: integer
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          example: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          example: 10
          maximum: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentosPaginados"
          description: Lista de talentos obtenida correctamente
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error interno del servidor
      summary: Lista talentos aplicando CV Ciego
      tags:
      - Talentos
      x-eov-operation-handler: controllers/TalentosController
    post:
      operationId: crearTalento
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalentoCreate"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentoCompleto"
          description: Talento creado correctamente
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Datos inválidos
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Ya existe un talento con ese correo o rut
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error interno del servidor
      summary: Crea un nuevo talento
      tags:
      - Talentos
      x-eov-operation-handler: controllers/TalentosController
  /talentos/{id}:
    delete:
      operationId: eliminarTalento
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          example: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                status: ok
                message: Talento eliminado correctamente
              schema:
                $ref: "#/components/schemas/MensajeRespuesta"
          description: Talento eliminado o desactivado correctamente
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Talento no encontrado
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error interno del servidor
      summary: Elimina lógicamente un talento
      tags:
      - Talentos
      x-eov-operation-handler: controllers/TalentosController
    get:
      operationId: obtenerTalentoPorId
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          example: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentoCompleto"
          description: Talento encontrado
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Talento no encontrado
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error interno del servidor
      summary: Obtiene un talento por ID
      tags:
      - Talentos
      x-eov-operation-handler: controllers/TalentosController
    put:
      operationId: actualizarTalento
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          example: 1
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TalentoUpdate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentoCompleto"
          description: Talento actualizado correctamente
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Datos inválidos
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Talento no encontrado
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error interno del servidor
      summary: Actualiza completamente un talento
      tags:
      - Talentos
      x-eov-operation-handler: controllers/TalentosController
  /talentos/{id}/estado:
    patch:
      operationId: cambiarEstadoTalento
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
