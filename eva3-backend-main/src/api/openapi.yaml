          description: Estado inválido
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Talento no encontrado
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error interno del servidor
      summary: Cambia el estado del perfil de un talento
      tags:
      - Talentos
      x-eov-operation-handler: controllers/TalentosController
  /empresas:
    get:
      description: "Retorna empresas con filtros por estado de validación, rubro y\
